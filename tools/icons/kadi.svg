<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coin" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#f3d27a"/>
      <stop offset="55%" stop-color="#d9a441"/>
      <stop offset="100%" stop-color="#a9701f"/>
    </radialGradient>
    <radialGradient id="coinInner" cx="42%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0f6b46"/>
      <stop offset="100%" stop-color="#0a4630"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="#0d2b20"/>

  <!-- corner card-suit accents, echoing the Whot/Matatu icons' playing-card motif -->
  <g fill="#E9E9E9" opacity="0.9">
    <path d="M192 210c0-34 28-58 58-58s58 24 58 58c0 46-58 92-58 92s-58-46-58-92z"/>
    <path d="M774 812c0-34 28-58 58-58s58 24 58 58c0 46-58 92-58 92s-58-46-58-92z"/>
  </g>
  <g fill="#E9E9E9" opacity="0.9">
    <rect x="150" y="770" width="120" height="120" rx="18" transform="rotate(-18 210 830)"/>
    <rect x="754" y="134" width="120" height="120" rx="18" transform="rotate(-18 814 194)"/>
  </g>

  <!-- the gold coin badge, matching the family's shared coin treatment -->
  <circle cx="512" cy="512" r="300" fill="url(#coin)"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#7a4e14" stroke-width="10"/>
  <circle cx="512" cy="512" r="238" fill="url(#coinInner)"/>

  <text x="512" y="628" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700"
        font-size="340" fill="#f0c774">K</text>
</svg>
